<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小小跳跃 | Little Jump</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        canvas { background: #2d2d44; border: 2px solid #444; cursor: crosshair; }
        #info { color: #888; font-size: 14px; margin-top: 10px; text-align: center; }
        #controls { color: #aaa; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="500"></canvas>
    <div id="info">空格=跳跃 | 右键=分离/融合/发射 | 蓄力时S调整发射高度 | 到达终点 ⭐ 获胜！</div>
    <div id="controls">A/D移动 | S压扁/调整高度 | 空格跳跃 | 右键长按蓄力，靠近右键融合，松开发射</div>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        // 物理常量
        const GRAVITY = 0.55;
        const MAX_POWER = 30;        // 最大发射力度
        const POWER_RATE = 0.3;      // 蓄力速度
        const JUMP_POWER_SMALL = 9;
        const JUMP_POWER_BIG = 14;
        const HOLD_FOR_SEPARATION = 60; // 1秒后分离
        const MAX_CHARGE_FRAMES = 180;  // 3秒最大蓄力
        const MOVE_SPEED = 5;
        
        // 土狼时间 & 跳跃缓冲
        const COYOTE_TIME = 8;
        const JUMP_BUFFER = 8;
        
        // 游戏状态
        let isSeparated = false;
        let isChargingW = false;
        let chargePower = 0;
        let holdFramesW = 0;
        let wasSeparating = false;
        let isCrouching = false;
        let coyoteTimer = 0;
        let jumpBufferTimer = 0;
        let gameWon = false;
        
        // 蓄力时可调整上半身位置
        let chargeUpperOffset = -50; // 默认在头上50像素
        const MIN_UPPER_OFFSET = -80; // 最高
        const MAX_UPPER_OFFSET = -20; // 最低
        
        // 角色
        const lower = {
            x: 60, y: 400,
            vy: 0,
            onGround: false,
            crouchHeight: 20,
            isJumping: false
        };
        
        const upper = {
            x: 60, y: 350,
            vx: 0, vy: 0,
            launched: false
        };
        
        const fireballs = [];
        let mouseX = 400, mouseY = 250;
        const keys = { a: false, d: false, s: false, space: false, w: false };
        
        // 关卡设计
        const platforms = [
            { x: 0, y: 460, w: 800, h: 40 },
            { x: 20, y: 400, w: 100, h: 20 },
            { x: 180, y: 360, w: 80, h: 20 },
            { x: 320, y: 300, w: 100, h: 20 },
            { x: 480, y: 240, w: 120, h: 20 },
            { x: 480, y: 280, w: 120, h: 10, isBarrier: true },
            { x: 650, y: 180, w: 130, h: 20 },
            { x: 50, y: 300, w: 80, h: 20 },
            { x: 150, y: 230, w: 80, h: 20 },
            { x: 280, y: 180, w: 100, h: 20 },
        ];
        
        const goal = { x: 700, y: 130, w: 30, h: 50 };
        
        const COLORS = {
            bg: '#1a1a2e',
            platform: '#4a4a6a',
            barrier: '#8b4513',
            player: '#e74c3c',
            head: '#f39c12',
            goal: '#ffd700'
        };
        
        // ===== 跳跃 =====
        function tryJump(isBigJump) {
            if (lower.onGround || coyoteTimer > 0) {
                const power = isBigJump ? JUMP_POWER_BIG : JUMP_POWER_SMALL;
                lower.vy = -power;
                lower.onGround = false;
                lower.isJumping = true;
                coyoteTimer = 0;
                jumpBufferTimer = 0;
                return true;
            }
            return false;
        }
        
        // ===== 碰撞检测 =====
        function checkPlatformCollision() {
            let wasOnGround = lower.onGround;
            lower.onGround = false;
            
            for (const p of platforms) {
                if (lower.vy >= 0) {
                    const prevBottom = lower.y - lower.vy;
                    const currBottom = lower.y;
                    
                    if (lower.x > p.x && lower.x < p.x + p.w) {
                        if (prevBottom <= p.y && currBottom >= p.y) {
                            lower.y = p.y;
                            lower.vy = 0;
                            lower.onGround = true;
                            lower.isJumping = false;
                            break;
                        }
                    }
                }
            }
            
            if (wasOnGround && !lower.onGround && lower.vy >= 0) {
                coyoteTimer = COYOTE_TIME;
            }
        }
        
        function checkGoal() {
            if (lower.x > goal.x && lower.x < goal.x + goal.w &&
                lower.y > goal.y && lower.y < goal.y + goal.h) {
                gameWon = true;
            }
        }
        
        function resetGame() {
            lower.x = 60;
            lower.y = 400;
            lower.vy = 0;
            upper.x = 60;
            upper.y = 350;
            upper.launched = false;
            isSeparated = false;
            gameWon = false;
        }
        
        // ===== 输入处理 =====
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA') keys.a = true;
            if (e.code === 'KeyD') keys.d = true;
            if (e.code === 'KeyS') { 
                keys.s = true; 
                isCrouching = true;
                // 蓄力时按S降低上半身位置
                if (isChargingW && !isSeparated) {
                    chargeUpperOffset = Math.min(chargeUpperOffset + 2, MAX_UPPER_OFFSET);
                }
            }
            if (e.code === 'KeyR' && gameWon) { resetGame(); }
            
            // 空格 = 跳跃（只管跳跃）
            if (e.code === 'Space') {
                e.preventDefault();
                if (!keys.space) {
                    keys.space = true;
                    jumpBufferTimer = JUMP_BUFFER;
                    
                    // 分离状态下也能跳
                    if (isSeparated && (lower.onGround || coyoteTimer > 0)) {
                        tryJump(false);
                    }
                }
            }
            
            // W键（备用）
            if (e.code === 'KeyW') {
                keys.w = true;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA') keys.a = false;
            if (e.code === 'KeyD') keys.d = false;
            if (e.code === 'KeyS') { keys.s = false; isCrouching = false; }
            
            // 空格松开 = 决定大小跳
            if (e.code === 'Space') {
                if (keys.space) {
                    if (!isSeparated) {
                        // 如果在地面上且没有在跳跃，尝试小跳
                        if (lower.onGround || coyoteTimer > 0) {
                            tryJump(false);
                        }
                    }
                    keys.space = false;
                    jumpBufferTimer = 0;
                }
            }
            
            // W松开
            if (e.code === 'KeyW') {
                keys.w = false;
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        // 左键 = 发射火球
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) shootFireball();
        });
        
        // 右键 = 融合/蓄力发射
        let isRightMouseDown = false;
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 2) {
                e.preventDefault();
                isRightMouseDown = true;
                
                // 分离状态下检查融合
                if (isSeparated) {
                    const dx = lower.x - upper.x;
                    const dy = lower.y - upper.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 50) {
                        // 靠近就融合
                        isSeparated = false;
                        upper.launched = false;
                        upper.x = lower.x;
                        upper.y = lower.y - 50;
                        isChargingW = false;
                        isRightMouseDown = false;
                    }
                } else {
                    // 合并状态开始蓄力
                    isChargingW = true;
                    holdFramesW = 0;
                    chargePower = 0;
                }
            }
        });
        
        // 右键松开 = 发射上半身
        canvas.addEventListener('mouseup', (e) => {
            if (e.button === 2) {
                e.preventDefault();
                isRightMouseDown = false;
                
                if (isChargingW && !isSeparated && holdFramesW > 0) {
                    // 蓄力状态松开：发射上半身
                    isSeparated = true;
                    upper.launched = true;
                    upper.x = lower.x;
                    upper.y = lower.y - 50;
                    
                    const angle = Math.atan2(mouseY - upper.y, mouseX - upper.x);
                    const power = Math.min(chargePower, MAX_POWER);
                    upper.vx = Math.cos(angle) * power;
                    upper.vy = Math.sin(angle) * power;
                }
                
                isChargingW = false;
                chargePower = 0;
                holdFramesW = 0;
                wasSeparating = false;
                chargeUpperOffset = -50;
            }
        });
        
        // 禁用右键菜单
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        function shootFireball() {
            const angle = Math.atan2(mouseY - upper.y, mouseX - upper.x);
            fireballs.push({
                x: upper.x, y: upper.y,
                vx: Math.cos(angle) * 10,
                vy: Math.sin(angle) * 10,
                radius: 6, life: 80
            });
        }
        
        // ===== 更新 =====
        function update() {
            if (gameWon) return;
            
            // 移动
            if (keys.a) lower.x -= MOVE_SPEED;
            if (keys.d) lower.x += MOVE_SPEED;
            
            // 跳跃缓冲
            if (jumpBufferTimer > 0 && !lower.isJumping) {
                jumpBufferTimer--;
                if (lower.onGround || coyoteTimer > 0) {
                    tryJump(false);
                }
            }
            
            // 土狼时间
            if (coyoteTimer > 0) coyoteTimer--;
            
            // 重力
            lower.vy += GRAVITY;
            lower.y += lower.vy;
            
            checkPlatformCollision();
            
            // 头的位置（蓄力时可调整，压扁时跟随）
            if (!isSeparated) {
                upper.x = lower.x;
                
                if (isCrouching) {
                    // 压扁时：头在身体上方25像素
                    upper.y = lower.y - 25;
                } else {
                    // 站立时：头在身体上方50像素
                    upper.y = lower.y - 50;
                }
            }
            
            // 右键蓄力检测（只蓄力，不分离）
            if (isRightMouseDown && isChargingW && !isSeparated) {
                holdFramesW++;
                chargePower = Math.min(chargePower + POWER_RATE, MAX_POWER);
                
                // 限制最大蓄力
                if (holdFramesW > MAX_CHARGE_FRAMES) {
                    holdFramesW = MAX_CHARGE_FRAMES;
                }
            }
            
            // 上半身飞行
            if (isSeparated && upper.launched) {
                upper.vy += GRAVITY;
                upper.x += upper.vx;
                upper.y += upper.vy;
                
                for (const p of platforms) {
                    if (upper.y + 15 > p.y && upper.y < p.y + p.h &&
                        upper.x > p.x && upper.x < p.x + p.w) {
                        upper.y = p.y - 15;
                        upper.vy *= -0.3;
                        upper.vx *= 0.8;
                        break;
                    }
                }
                
                if (upper.x < 15) { upper.x = 15; upper.vx *= -0.5; }
                if (upper.x > 785) { upper.x = 785; upper.vx *= -0.5; }
            } else if (isSeparated) {
                upper.x = lower.x;
                upper.y = lower.y - 50;
            }
            
            // 火球
            for (let i = fireballs.length - 1; i >= 0; i--) {
                const fb = fireballs[i];
                fb.x += fb.vx;
                fb.y += fb.vy;
                fb.vy += 0.15;
                fb.life--;
                if (fb.life <= 0 || fb.y > 500 || fb.x < 0 || fb.x > 800) {
                    fireballs.splice(i, 1);
                }
            }
            
            lower.x = Math.max(15, Math.min(785, lower.x));
            checkGoal();
        }
        
        // ===== 绘制 =====
        function draw() {
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, 800, 500);
            
            // 背景星星
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            for (let i = 0; i < 30; i++) {
                ctx.fillRect((i * 97) % 800, (i * 53) % 300, 2, 2);
            }
            
            // 平台
            for (const p of platforms) {
                ctx.fillStyle = p.isBarrier ? COLORS.barrier : COLORS.platform;
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(p.x, p.y, p.w, 3);
            }
            
            // 终点
            ctx.fillStyle = COLORS.goal;
            ctx.fillRect(goal.x, goal.y, 4, goal.h);
            ctx.beginPath();
            ctx.moveTo(goal.x + 4, goal.y);
            ctx.lineTo(goal.x + 30, goal.y + 15);
            ctx.lineTo(goal.x + 4, goal.y + 30);
            ctx.fillStyle = '#ff6b6b';
            ctx.fill();
            
            // 下半身
            const bodyH = isCrouching ? lower.crouchHeight : 40;
            ctx.fillStyle = COLORS.player;
            ctx.fillRect(lower.x - 15, lower.y - bodyH, 30, bodyH);
            
            ctx.fillStyle = '#c0392b';
            if (!isCrouching) {
                ctx.fillRect(lower.x - 12, lower.y - 5, 6, 10);
                ctx.fillRect(lower.x + 6, lower.y - 5, 6, 10);
            } else {
                ctx.fillRect(lower.x - 15, lower.y - 5, 8, 5);
                ctx.fillRect(lower.x + 7, lower.y - 5, 8, 5);
            }
            
            // 上半身
            ctx.fillStyle = COLORS.head;
            ctx.beginPath();
            ctx.arc(upper.x, upper.y, 15, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(upper.x - 5, upper.y - 3, 4, 0, Math.PI * 2);
            ctx.arc(upper.x + 5, upper.y - 3, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(upper.x - 4, upper.y - 2, 2, 0, Math.PI * 2);
            ctx.arc(upper.x + 6, upper.y - 2, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 右键蓄力圈（完整360°）
            if (isChargingW && holdFramesW > 0) {
                const progress = Math.min(holdFramesW / MAX_CHARGE_FRAMES, 1);
                const sepRatio = HOLD_FOR_SEPARATION / MAX_CHARGE_FRAMES;
                
                // 背景圈（完整灰色）
                ctx.strokeStyle = 'rgba(80, 80, 80, 0.5)';
                ctx.lineWidth = 10;
                ctx.beginPath();
                ctx.arc(upper.x, upper.y, 38, 0, Math.PI * 2);
                ctx.stroke();
                
                // 设置颜色
                if (progress < sepRatio) {
                    const alpha = 0.6 + (progress / sepRatio) * 0.4;
                    ctx.fillStyle = `rgba(255, 220, 0, ${alpha})`; // 黄色
                } else {
                    const powerProgress = (progress - sepRatio) / (1 - sepRatio);
                    const r = Math.floor(50 + powerProgress * 205);
                    const g = Math.floor(255 - powerProgress * 150);
                    const b = 50;
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.9)`;
                }
                
                // 画扇形填充（处理满圈情况）
                ctx.beginPath();
                ctx.moveTo(upper.x, upper.y);
                if (progress >= 0.99) {
                    // 满圈时画完整圆
                    ctx.arc(upper.x, upper.y, 38, 0, Math.PI * 2, false);
                } else {
                    const startAngle = -Math.PI / 2;
                    const endAngle = startAngle + Math.PI * 2 * progress;
                    ctx.arc(upper.x, upper.y, 38, startAngle, endAngle, false);
                }
                ctx.closePath();
                ctx.fill();
                
                // 外圈描边
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(upper.x, upper.y, 38, 0, Math.PI * 2);
                ctx.stroke();
                
                // 分离点标记
                if (!isSeparated) {
                    const sepAngle = -Math.PI / 2 + Math.PI * 2 * sepRatio;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(
                        upper.x + Math.cos(sepAngle) * 38,
                        upper.y + Math.sin(sepAngle) * 38,
                        5, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
                
                // 中心显示力度百分比
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`${Math.round(progress * 100)}%`, upper.x, upper.y + 4);
                ctx.textAlign = 'left';
            }
            
            // 瞄准线
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(upper.x, upper.y);
            const angle = Math.atan2(mouseY - upper.y, mouseX - upper.x);
            ctx.lineTo(upper.x + Math.cos(angle) * 80, upper.y + Math.sin(angle) * 80);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 火球
            for (const fb of fireballs) {
                const alpha = fb.life / 80;
                ctx.fillStyle = `rgba(255, 150, 0, ${alpha})`;
                ctx.beginPath();
                ctx.arc(fb.x, fb.y, fb.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = `rgba(255, 255, 0, ${alpha})`;
                ctx.beginPath();
                ctx.arc(fb.x, fb.y, fb.radius - 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // UI
            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            
            if (gameWon) {
                ctx.fillStyle = '#ffd700';
                ctx.font = '32px Arial';
                ctx.fillText('🎉 到达终点！按 R 重新开始 🎉', 200, 250);
            } else {
                ctx.fillText('小小跳跃', 10, 20);
                if (isSeparated) {
                    ctx.fillText('分离模式 | 空格=下身跳跃 | 靠近+右键=融合', 10, 480);
                } else if (isCrouching) {
                    ctx.fillText('压扁中...', 10, 480);
                } else if (isChargingW) {
                    const progress = Math.min(holdFramesW / MAX_CHARGE_FRAMES, 1);
                    const seconds = (holdFramesW / 60).toFixed(1);
                    const percent = Math.round(progress * 100);
                    ctx.fillText(`蓄力中: ${seconds}s / 3.0s (${percent}%) | 松开发射`, 10, 480);
                } else {
                    ctx.fillText('空格=跳跃 | 长按右键=蓄力发射 | 靠近+右键=融合', 10, 480);
                }
                
                if (coyoteTimer > 0) {
                    ctx.fillStyle = 'rgba(0, 255, 0, 0.5)';
                    ctx.fillText('土狼!', lower.x - 15, lower.y - 60);
                }
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
</html>
