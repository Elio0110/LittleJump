<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>半身分离demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        canvas { background: #2d2d44; border: 2px solid #444; cursor: crosshair; }
        #info { color: #888; font-size: 14px; margin-top: 10px; text-align: center; }
        #controls { color: #aaa; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="500"></canvas>
    <div id="info">短按空格跳跃 | 长按空格分离+发射上半身 | 分离后短按空格融合</div>
    <div id="controls">A/D移动 | 鼠标瞄准 | 左键发射火球 | 火球始终从头发射</div>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const GRAVITY = 0.6;
        const MAX_POWER = 18;
        const POWER_RATE = 0.3;
        const JUMP_POWER = 12;
        const HOLD_THRESHOLD = 20;
        
        let isSeparated = false;
        let isCharging = false;
        let chargePower = 0;
        let holdFrames = 0;
        let wasSeparating = false;
        
        const lowerBody = {
            x: 400, y: 300,
            vx: 0, vy: 0,
            speed: 5,
            color: '#e74c3c',
            onGround: false
        };
        
        // 上半身位置（头的位置）
        const upperBody = {
            x: 400, y: 245, // 合并时在头上
            vx: 0, vy: 0,
            color: '#f39c12',
            launched: false
        };
        
        const fireballs = [];
        let mouseX = 0, mouseY = 0;
        const keys = { a: false, d: false, space: false };
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA') keys.a = true;
            if (e.code === 'KeyD') keys.d = true;
            if (e.code === 'Space') {
                e.preventDefault();
                if (!keys.space) {
                    keys.space = true;
                    holdFrames = 0;
                    isCharging = true;
                    wasSeparating = false;
                    
                    if (isSeparated && upperBody.launched) {
                        tryMerge();
                        isCharging = false;
                    }
                }
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA') keys.a = false;
            if (e.code === 'KeyD') keys.d = false;
            if (e.code === 'Space') {
                if (keys.space) {
                    if (wasSeparating && isSeparated) {
                        launchUpperBody();
                    } else if (!isSeparated && holdFrames < HOLD_THRESHOLD && lowerBody.onGround) {
                        lowerBody.vy = -JUMP_POWER;
                        lowerBody.onGround = false;
                    }
                    keys.space = false;
                    isCharging = false;
                    holdFrames = 0;
                    wasSeparating = false;
                }
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) shootFireball();
        });
        
        function launchUpperBody() {
            const angle = Math.atan2(mouseY - upperBody.y, mouseX - upperBody.x);
            const power = Math.min(chargePower, MAX_POWER);
            upperBody.vx = Math.cos(angle) * power;
            upperBody.vy = Math.sin(angle) * power;
            upperBody.launched = true;
            isCharging = false;
            chargePower = 0;
        }
        
        function tryMerge() {
            const dx = lowerBody.x - upperBody.x;
            const dy = lowerBody.y - upperBody.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < 60) {
                isSeparated = false;
                upperBody.launched = false;
                // 融合后头位置重置
                upperBody.x = lowerBody.x;
                upperBody.y = lowerBody.y - 55;
                upperBody.vx = 0;
                upperBody.vy = 0;
            }
        }
        
        function shootFireball() {
            // 火球始终从头（upperBody位置）发射
            const angle = Math.atan2(mouseY - upperBody.y, mouseX - upperBody.x);
            fireballs.push({
                x: upperBody.x,
                y: upperBody.y,
                vx: Math.cos(angle) * 12,
                vy: Math.sin(angle) * 12,
                radius: 8, life: 100
            });
        }
        
        function update() {
            // 下半身移动
            if (keys.a) lowerBody.x -= lowerBody.speed;
            if (keys.d) lowerBody.x += lowerBody.speed;
            
            // 重力
            lowerBody.vy += GRAVITY;
            lowerBody.y += lowerBody.vy;
            
            if (lowerBody.y > 460) {
                lowerBody.y = 460;
                lowerBody.vy = 0;
                lowerBody.onGround = true;
            } else {
                lowerBody.onGround = false;
            }
            
            // 更新头的位置（合并时跟随下身）
            if (!isSeparated) {
                upperBody.x = lowerBody.x;
                upperBody.y = lowerBody.y - 55;
            }
            
            // 蓄力检测
            if (keys.space && isCharging && !isSeparated) {
                holdFrames++;
                chargePower = Math.min(chargePower + POWER_RATE, MAX_POWER);
                
                if (holdFrames >= HOLD_THRESHOLD) {
                    // 分离!
                    isSeparated = true;
                    upperBody.launched = false;
                    upperBody.x = lowerBody.x;
                    upperBody.y = lowerBody.y - 55;
                    wasSeparating = true;
                    isCharging = false;
                }
            }
            
            if (isSeparated) {
                if (upperBody.launched) {
                    // 飞行中
                    upperBody.vy += GRAVITY;
                    upperBody.x += upperBody.vx;
                    upperBody.y += upperBody.vy;
                    
                    if (upperBody.y > 460) {
                        upperBody.y = 460;
                        upperBody.vy = 0;
                        upperBody.vx *= 0.8;
                    }
                    
                    if (upperBody.x < 15) { upperBody.x = 15; upperBody.vx *= -0.5; }
                    if (upperBody.x > 785) { upperBody.x = 785; upperBody.vx *= -0.5; }
                } else {
                    // 分离后跟随下身（但不上半身位置）
                    upperBody.x = lowerBody.x;
                    upperBody.y = lowerBody.y - 55;
                }
            }
            
            // 更新火球
            for (let i = fireballs.length - 1; i >= 0; i--) {
                const fb = fireballs[i];
                fb.x += fb.vx;
                fb.y += fb.vy;
                fb.vy += 0.1;
                fb.life--;
                
                if (fb.life <= 0 || fb.y > 500 || fb.x < 0 || fb.x > 800) {
                    fireballs.splice(i, 1);
                }
            }
            
            lowerBody.x = Math.max(15, Math.min(785, lowerBody.x));
        }
        
        function draw() {
            ctx.clearRect(0, 0, 800, 500);
            
            // 地面
            ctx.fillStyle = '#3d3d5c';
            ctx.fillRect(0, 460, 800, 40);
            
            // 下半身
            ctx.fillStyle = lowerBody.color;
            ctx.fillRect(lowerBody.x - 15, lowerBody.y - 40, 30, 40);
            ctx.fillStyle = '#c0392b';
            ctx.fillRect(lowerBody.x - 5, lowerBody.y - 45, 4, 10);
            ctx.fillRect(lowerBody.x + 1, lowerBody.y - 45, 4, 10);
            
            // 上半身（头）
            ctx.fillStyle = upperBody.color;
            ctx.beginPath();
            ctx.arc(upperBody.x, upperBody.y, 15, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(upperBody.x - 5, upperBody.y - 3, 3, 0, Math.PI * 2);
            ctx.arc(upperBody.x + 5, upperBody.y - 3, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // 瞄准线和蓄力指示器
            if (!isSeparated) {
                if (isCharging && holdFrames > 0) {
                    const progress = Math.min(holdFrames / HOLD_THRESHOLD, 1);
                    ctx.strokeStyle = `rgba(255, 255, 0, ${progress})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(upperBody.x, upperBody.y, 20 + progress * 10, 0, Math.PI * 2 * progress);
                    ctx.stroke();
                }
            }
            
            // 瞄准线
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(upperBody.x, upperBody.y);
            const angle = Math.atan2(mouseY - upperBody.y, mouseX - upperBody.x);
            ctx.lineTo(upperBody.x + Math.cos(angle) * 100, upperBody.y + Math.sin(angle) * 100);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 火球
            for (const fb of fireballs) {
                const alpha = fb.life / 100;
                ctx.fillStyle = `rgba(255, 100, 0, ${alpha})`;
                ctx.beginPath();
                ctx.arc(fb.x, fb.y, fb.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = `rgba(255, 200, 0, ${alpha * 0.5})`;
                ctx.beginPath();
                ctx.arc(fb.x, fb.y, fb.radius + 4, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // UI
            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            if (isSeparated) {
                if (upperBody.launched) {
                    ctx.fillText('状态: 上半身飞行中 | 靠近后短按空格融合', 10, 20);
                } else {
                    ctx.fillText('状态: 分离 | 短按空格融合', 10, 20);
                }
            } else {
                if (isCharging && holdFrames > 0) {
                    const progress = Math.round(Math.min(holdFrames / HOLD_THRESHOLD * 100, 100));
                    ctx.fillText(`蓄力: ${progress}% | 松开分离+发射`, 10, 20);
                } else {
                    ctx.fillText('短按跳跃 | 长按分离发射', 10, 20);
                }
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
</html>
