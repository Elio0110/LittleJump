<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小小跳跃 | Little Jump</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a2e; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            flex-direction: column;
        }
        canvas { background: #2d2d44; border: 2px solid #444; cursor: crosshair; }
        #info { color: #888; font-size: 14px; margin-top: 10px; text-align: center; }
        #controls { color: #aaa; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="500"></canvas>
    <div id="info">短按空格跳跃 | 长按空格分离+发射上半身 | 分离后短按空格融合</div>
    <div id="controls">A/D移动 | S压扁 | 鼠标瞄准 | 左键发射火球</div>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const GRAVITY = 0.5;
        const MAX_POWER = 15;
        const POWER_RATE = 0.3;
        const JUMP_POWER = 12;
        const HOLD_THRESHOLD = 15;
        
        let isSeparated = false;
        let isCharging = false;
        let chargePower = 0;
        let holdFrames = 0;
        let wasSeparating = false;
        let isCrouching = false;
        
        // 下半身
        const lower = {
            x: 400, y: 350,
            vy: 0,
            onGround: false,
            crouchHeight: 20
        };
        
        // 上半身
        const upper = {
            x: 400, y: 300,
            vx: 0, vy: 0,
            launched: false
        };
        
        const fireballs = [];
        let mouseX = 400, mouseY = 250;
        const keys = { a: false, d: false, s: false, space: false };
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA') keys.a = true;
            if (e.code === 'KeyD') keys.d = true;
            if (e.code === 'KeyS') { keys.s = true; isCrouching = true; }
            if (e.code === 'Space') {
                e.preventDefault();
                if (!keys.space) {
                    keys.space = true;
                    holdFrames = 0;
                    isCharging = true;
                    wasSeparating = false;
                    
                    // 分离状态下先检查是否能融合
                    if (isSeparated) {
                        const dx = lower.x - upper.x;
                        const dy = lower.y - upper.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 50) {
                            // 靠近就融合
                            isSeparated = false;
                            upper.launched = false;
                            upper.x = lower.x;
                            upper.y = lower.y - 50;
                            isCharging = false;
                        }
                    }
                }
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA') keys.a = false;
            if (e.code === 'KeyD') keys.d = false;
            if (e.code === 'KeyS') { keys.s = false; isCrouching = false; }
            if (e.code === 'Space') {
                if (keys.space) {
                    // 长按后松开 = 发射上半身
                    if (wasSeparating && isSeparated) {
                        const angle = Math.atan2(mouseY - upper.y, mouseX - upper.x);
                        const power = Math.min(chargePower, MAX_POWER);
                        upper.vx = Math.cos(angle) * power;
                        upper.vy = Math.sin(angle) * power;
                        upper.launched = true;
                    }
                    // 合并状态短按 = 跳跃
                    else if (!isSeparated && holdFrames < HOLD_THRESHOLD && lower.onGround) {
                        lower.vy = -JUMP_POWER;
                        lower.onGround = false;
                    }
                    // 分离状态短按 = 下身跳跃（没融合的情况）
                    else if (isSeparated && holdFrames < HOLD_THRESHOLD && lower.onGround) {
                        lower.vy = -JUMP_POWER;
                        lower.onGround = false;
                    }
                    
                    keys.space = false;
                    isCharging = false;
                    chargePower = 0;
                    holdFrames = 0;
                    wasSeparating = false;
                }
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) shootFireball();
        });
        
        function shootFireball() {
            const angle = Math.atan2(mouseY - upper.y, mouseX - upper.x);
            fireballs.push({
                x: upper.x, y: upper.y,
                vx: Math.cos(angle) * 10,
                vy: Math.sin(angle) * 10,
                radius: 6, life: 80
            });
        }
        
        function tryMerge() {
            const dx = lower.x - upper.x;
            const dy = lower.y - upper.y;
            if (Math.sqrt(dx*dx + dy*dy) < 50) {
                isSeparated = false;
                upper.launched = false;
                upper.x = lower.x;
                upper.y = lower.y - 40;
            }
        }
        
        function update() {
            // 移动
            if (keys.a) lower.x -= 5;
            if (keys.d) lower.x += 5;
            
            // 重力
            lower.vy += GRAVITY;
            lower.y += lower.vy;
            
            const groundY = 450;
            if (lower.y >= groundY) {
                lower.y = groundY;
                lower.vy = 0;
                lower.onGround = true;
            } else {
                lower.onGround = false;
            }
            
            // 头的位置
            if (!isSeparated) {
                upper.x = lower.x;
                upper.y = isCrouching ? lower.y - 25 : lower.y - 50;
            }
            
            // 蓄力检测
            if (keys.space && isCharging && !isSeparated) {
                holdFrames++;
                chargePower = Math.min(chargePower + POWER_RATE, MAX_POWER);
                
                if (holdFrames >= HOLD_THRESHOLD) {
                    // 达到阈值，分离
                    isSeparated = true;
                    upper.launched = false;
                    upper.x = lower.x;
                    upper.y = lower.y - 50;
                    wasSeparating = true;
                    isCharging = false;
                }
            }
            
            // 上半身飞行
            if (isSeparated && upper.launched) {
                upper.vy += GRAVITY;
                upper.x += upper.vx;
                upper.y += upper.vy;
                
                if (upper.y >= groundY) {
                    upper.y = groundY;
                    upper.vy *= -0.4;
                    upper.vx *= 0.7;
                }
                if (upper.x < 20) { upper.x = 20; upper.vx *= -0.5; }
                if (upper.x > 780) { upper.x = 780; upper.vx *= -0.5; }
            } else if (isSeparated) {
                upper.x = lower.x;
                upper.y = lower.y - 50;
            }
            
            // 火球
            for (let i = fireballs.length - 1; i >= 0; i--) {
                const fb = fireballs[i];
                fb.x += fb.vx;
                fb.y += fb.vy;
                fb.vy += 0.2;
                fb.life--;
                if (fb.life <= 0 || fb.y > 500 || fb.x < 0 || fb.x > 800) {
                    fireballs.splice(i, 1);
                }
            }
            
            // 边界
            lower.x = Math.max(20, Math.min(780, lower.x));
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, 800, 500);
            
            // 地面
            ctx.fillStyle = '#3d3d5c';
            ctx.fillRect(0, 450, 800, 50);
            
            // 下半身
            const bodyH = isCrouching ? lower.crouchHeight : 40;
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(lower.x - 15, lower.y - bodyH, 30, bodyH);
            
            // 腿
            ctx.fillStyle = '#c0392b';
            if (!isCrouching) {
                ctx.fillRect(lower.x - 12, lower.y - 5, 6, 10);
                ctx.fillRect(lower.x + 6, lower.y - 5, 6, 10);
            } else {
                ctx.fillRect(lower.x - 15, lower.y - 5, 8, 5);
                ctx.fillRect(lower.x + 7, lower.y - 5, 8, 5);
            }
            
            // 上半身
            ctx.fillStyle = '#f39c12';
            ctx.beginPath();
            ctx.arc(upper.x, upper.y, 15, 0, Math.PI * 2);
            ctx.fill();
            
            // 眼睛
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(upper.x - 5, upper.y - 3, 4, 0, Math.PI * 2);
            ctx.arc(upper.x + 5, upper.y - 3, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(upper.x - 4, upper.y - 2, 2, 0, Math.PI * 2);
            ctx.arc(upper.x + 6, upper.y - 2, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 蓄力圈
            if (isCharging && holdFrames > 0) {
                const progress = Math.min(holdFrames / HOLD_THRESHOLD, 1);
                ctx.strokeStyle = `rgba(255, 255, 0, ${progress})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(upper.x, upper.y, 20 + progress * 10, 0, Math.PI * 2 * progress);
                ctx.stroke();
            }
            
            // 瞄准线
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(upper.x, upper.y);
            const angle = Math.atan2(mouseY - upper.y, mouseX - upper.x);
            ctx.lineTo(upper.x + Math.cos(angle) * 80, upper.y + Math.sin(angle) * 80);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 火球
            for (const fb of fireballs) {
                ctx.fillStyle = `rgba(255, 150, 0, ${fb.life / 80})`;
                ctx.beginPath();
                ctx.arc(fb.x, fb.y, fb.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = `rgba(255, 255, 0, ${fb.life / 80})`;
                ctx.beginPath();
                ctx.arc(fb.x, fb.y, fb.radius - 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // UI
            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            if (isSeparated) {
                ctx.fillText('分离模式 | 空格=下身跳跃/发射 | 靠近后空格融合', 10, 20);
            } else if (isCrouching) {
                ctx.fillText('压扁中', 10, 20);
            } else if (isCharging) {
                ctx.fillText(`蓄力中: ${Math.round(holdFrames / HOLD_THRESHOLD * 100)}%`, 10, 20);
            } else {
                ctx.fillText('短按空格=跳跃 | 长按空格=分离+发射', 10, 20);
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
</html>
